<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車庫小籠包 - 終極智慧管理後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .progress-bar { transition: width 0.6s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans antialiased pb-16">

    <!-- 頂部導覽列 -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">📊</span>
                <h1 class="text-lg font-black tracking-wider">車庫小籠包 數據與物料總後台</h1>
            </div>
            <div class="flex items-center gap-2">
                <a href="inventory.html" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm transition-all flex items-center gap-1">
                    📦 物料進貨管理
                </a>
                <a href="index.html" class="bg-orange-600 hover:bg-orange-700 text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm transition-all flex items-center gap-1">
                    🥟 回點餐檯
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6 space-y-4">

        <!-- 區塊一：AI 經營洞察快報 -->
        <div class="bg-gradient-to-r from-orange-500 to-amber-500 rounded-xl p-4 text-white shadow-sm flex items-center gap-3">
            <span class="text-2xl">💡</span>
            <div>
                <h2 class="text-xs font-black uppercase tracking-wider opacity-75">Python 大數據 AI 經營洞察</h2>
                <p id="ai-insight-text" class="text-sm font-black mt-0.5">正在分析營業歷史數據...</p>
            </div>
        </div>

        <!-- 🛠️ 摺疊式抽屜面板 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <button onclick="togglePricePanel()" class="w-full px-4 py-3 bg-slate-100 hover:bg-slate-200/70 flex justify-between items-center cursor-pointer transition-all">
                <div class="flex items-center gap-2">
                    <span class="text-sm">⚙️</span>
                    <h3 class="font-black text-xs text-slate-700 tracking-wide">全店品項單價即時調整 (點擊展開/收合)</h3>
                </div>
                <span id="panel-arrow" class="text-xs text-slate-400 font-bold">展開 ▾</span>
            </button>
            
            <div id="price-panel-content" class="hidden p-4 border-t border-slate-100 bg-slate-50/50">
                <div id="price-management-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
                    <p class="text-xs text-slate-400 col-span-full text-center py-2">正在同步資料庫清單...</p>
                </div>
            </div>
        </div>

        <!-- 區塊三：智慧分析雙欄區 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <!-- 明日 AI 智慧備料建議 -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                    <div class="flex items-center gap-1.5">
                        <span class="text-base">🧠</span>
                        <h3 class="font-black text-xs text-slate-700">明日 AI 智慧備料建議</h3>
                    </div>
                    <span class="text-[9px] bg-orange-100 text-orange-600 font-extrabold px-1.5 py-0.5 rounded">FastAPI 核心</span>
                </div>
                <div id="ai-inventory-container" class="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                    <p class="text-xs text-slate-400 text-center py-4">正在計算庫存水位...</p>
                </div>
            </div>

            <!-- 全店熱銷爆款排行榜 -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                    <div class="flex items-center gap-1.5">
                        <span class="text-base">👑</span>
                        <h3 class="font-black text-xs text-slate-700">全店熱銷爆款排行榜</h3>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="loadRanking('all')" id="btn-rank-all" class="text-[10px] bg-slate-900 text-white font-bold px-2 py-0.5 rounded">累計</button>
                        <button onclick="loadRanking('today')" id="btn-rank-today" class="text-[10px] bg-slate-100 text-slate-600 font-bold px-2 py-0.5 rounded">今天</button>
                    </div>
                </div>
                <div id="ai-ranking-container" class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                    <p class="text-xs text-slate-400 text-center py-4">正在對帳計算排行...</p>
                </div>
            </div>

        </div>

        <!-- 區塊四：今日營業原始流水帳 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 space-y-3">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <div class="flex items-center gap-1.5">
                    <span class="text-base">📋</span>
                    <h3 class="font-black text-xs text-slate-700">今日營業原始流水帳</h3>
                </div>
                <span class="text-[9px] bg-indigo-100 text-indigo-600 font-extrabold px-1.5 py-0.5 rounded">Express 連動</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 font-black border-b border-slate-100">
                            <th class="py-2.5 px-3">交易時間</th>
                            <th class="py-2.5 px-3">銷售品項</th>
                            <th class="py-2.5 px-3">數量</th>
                            <th class="py-2.5 px-3">單價</th>
                            <th class="py-2.5 px-3 text-orange-600">總金額</th>
                            <th class="py-2.5 px-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="raw-logs-tbody" class="divide-y divide-slate-100 font-bold text-slate-700">
                        <tr>
                            <td colspan="6" class="text-center py-6 text-slate-400">正在撈取今日交易紀錄...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const EXPRESS_URL = window.location.origin; 
        const FASTAPI_URL = '/api/fastapi';

        document.addEventListener('DOMContentLoaded', () => {
            loadPriceManagement();
            loadTodayRawLogs();
            loadAiInsights();
            loadAiPredictions();
            loadRanking('all');
        });

        function togglePricePanel() {
            const content = document.getElementById('price-panel-content');
            const arrow = document.getElementById('panel-arrow');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                arrow.innerText = "收合 ▴";
            } else {
                content.classList.add('hidden');
                arrow.innerText = "展開 ▾";
            }
        }

        function loadPriceManagement() {
            const container = document.getElementById('price-management-grid');
            fetch(`${EXPRESS_URL}/api/products`)
                .then(res => res.json())
                .then(products => {
                    if(!products || products.length === 0) return;
                    container.innerHTML = '';
                    products.forEach(p => {
                        const div = document.createElement('div');
                        div.className = "bg-white border border-slate-200 p-2 rounded-lg flex flex-col justify-between gap-1 shadow-sm";
                        div.innerHTML = `
                            <div class="flex justify-between items-center">
                                <span class="font-black text-slate-800 text-[11px] truncate max-w-[70%]">${p.name}</span>
                                <span class="text-[9px] text-slate-400">/${p.unit || '份'}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-slate-400 text-[10px]">$</span>
                                <input type="number" id="price-input-${p.id}" value="${p.price}" 
                                       class="w-full bg-slate-50 border border-slate-200 rounded px-1 py-0.5 text-[11px] text-center font-extrabold text-slate-700 focus:outline-none">
                                <button onclick="updatePrice(${p.id}, '${p.name}')" 
                                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-black text-[9px] px-1.5 py-1 rounded transition-all cursor-pointer">
                                    改
                                </button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                });
        }

        function updatePrice(id, name) {
            const newPrice = parseInt(document.getElementById(`price-input-${id}`).value);
            if (isNaN(newPrice) || newPrice < 0) return;

            fetch(`${EXPRESS_URL}/api/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ price: newPrice })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(`🎉 ${name} 單價已改為 $${newPrice} 元！`);
                    loadPriceManagement();
                    loadAiPredictions();
                    loadRanking('all');
                }
            });
        }

        // [Express] 載入流水帳
        function loadTodayRawLogs() {
            const tbody = document.getElementById('raw-logs-tbody');
            fetch(`${EXPRESS_URL}/api/reports/today-raw-logs`)
                .then(res => res.json())
                .then(logs => {
                    if (!logs || logs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-slate-400">📅 今日目前尚無點單交易紀錄</td></tr>';
                        return;
                    }
                    tbody.innerHTML = '';
                    logs.forEach(log => {
                        const timeStr = new Date(log.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50 border-b border-slate-100 transition-colors";
                        tr.innerHTML = `
                            <td class="py-2.5 px-3 text-slate-400">${timeStr}</td>
                            <td class="py-2.5 px-3 font-black text-slate-800">${log.product_name}</td>
                            <td class="py-2.5 px-3">${log.quantity}</td>
                            <td class="py-2.5 px-3 text-slate-400">$${log.price}</td>
                            <td class="py-2.5 px-3 text-orange-600 font-extrabold">$${log.total_revenue}</td>
                            <td class="py-2.5 px-3 text-center">
                                <button onclick="voidSale(${log.id})" class="bg-red-50 hover:bg-red-500 text-red-600 hover:text-white border border-red-100 text-[10px] font-bold px-1.5 py-0.5 rounded transition-all cursor-pointer">
                                    作廢
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function voidSale(id) {
            if (!confirm("⚠️ 確定要作廢這筆紀錄並回補庫存嗎？")) return;
            fetch(`${EXPRESS_URL}/api/sales/${id}/void`, { method: 'PUT' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        loadTodayRawLogs();
                        loadAiPredictions();
                        loadRanking('all');
                    }
                });
        }

        function loadAiInsights() {
            fetch(`${FASTAPI_URL}/monthly-trend`)
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.best_day_insight) {
                        document.getElementById('ai-insight-text').innerText = res.best_day_insight;
                    } else {
                        document.getElementById('ai-insight-text').innerText = "💡 今日暫無足夠銷售數據，等下點單結帳後，AI 就能幫忙分析囉！";
                    }
                })
                .catch(() => {
                    document.getElementById('ai-insight-text').innerText = "⚠️ 正在同步通電中，稍等 3秒重新整理網頁即可。";
                });
        }

        function loadAiPredictions() {
            const container = document.getElementById('ai-inventory-container');
            fetch(`${FASTAPI_URL}/inventory-prediction`)
                .then(res => res.json())
                .then(res => {
                    if (!res.success) return;
                    container.innerHTML = '';
                    res.data.forEach(item => {
                        let alertColor = "bg-green-50 border-green-100 text-green-700";
                        let badgeColor = "bg-green-100 text-green-800";
                        if (item.alert_level === "CRITICAL") {
                            alertColor = "bg-red-50 border-red-100 text-red-700";
                            badgeColor = "bg-red-100 text-red-800";
                        } else if (item.alert_level === "WARNING") {
                            alertColor = "bg-amber-50 border-amber-100 text-amber-700";
                            badgeColor = "bg-amber-100 text-amber-800";
                        }

                        const div = document.createElement('div');
                        div.className = `p-2 rounded-lg border ${alertColor} flex justify-between items-center text-[11px]`;
                        div.innerHTML = `
                            <div>
                                <div class="flex items-center gap-1">
                                    <span class="font-black text-slate-800 text-xs">${item.name}</span>
                                    <span class="text-[9px] px-1 rounded font-bold ${badgeColor}">${item.category}</span>
                                </div>
                                <div class="text-[11px] font-black mt-0.5 text-indigo-600">${item.tips}</div>
                            </div>
                            <div class="text-right font-black">
                                ${item.suggested_restock_qty > 0 ? `<span class="text-red-600">+${item.suggested_restock_qty}</span>` : `<span class="text-emerald-600">✓ 安全</span>`}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                });
        }

        function loadRanking(rangeType) {
            const container = document.getElementById('ai-ranking-container');
            if(rangeType === 'all') {
                document.getElementById('btn-rank-all').className = "text-[10px] bg-slate-900 text-white font-bold px-2 py-0.5 rounded";
                document.getElementById('btn-rank-today').className = "text-[10px] bg-slate-100 text-slate-600 font-bold px-2 py-0.5 rounded";
            } else {
                document.getElementById('btn-rank-all').className = "text-[10px] bg-slate-100 text-slate-600 font-bold px-2 py-0.5 rounded";
                document.getElementById('btn-rank-today').className = "text-[10px] bg-slate-900 text-white font-bold px-2 py-0.5 rounded";
            }

            fetch(`${FASTAPI_URL}/sales-ranking?range_type=${rangeType}`)
                .then(res => res.json())
                .then(res => {
                    if (!res.success || res.data.length === 0) {
                        container.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">今日暫無銷售排行數據</p>';
                        return;
                    }
                    container.innerHTML = '';
                    res.data.forEach(item => {
                        let rankMedal = `<span class="w-4 h-4 bg-slate-100 text-slate-600 font-black text-[10px] rounded-full flex items-center justify-center">${item.rank}</span>`;
                        if (item.rank === 1) rankMedal = '🥇';
                        if (item.rank === 2) rankMedal = '🥈';
                        if (item.rank === 3) rankMedal = '🥉';

                        const div = document.createElement('div');
                        div.className = "space-y-0.5 text-[11px]";
                        div.innerHTML = `
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-1">
                                    ${rankMedal} <span class="font-black text-slate-800 text-xs">${item.name}</span>
                                </div>
                                <div class="font-bold text-slate-500">賣出 ${item.total_sold_qty} | <span class="text-orange-600 font-black">$${item.total_revenue}</span></div>
                            </div>
                            <div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden">
                                <div class="bg-gradient-to-r from-orange-500 to-amber-500 h-1 progress-bar rounded-full" style="width: ${item.revenue_share_percent}%"></div>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                });
        }
    </script>
</body>
</html>
