<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車庫小籠包 - 分類點餐結帳檯</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        /* 讓分類區域滑動時更順暢 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans antialiased pb-28">

    <header class="bg-orange-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">🥟</span>
                <h1 class="text-lg font-black tracking-wider">車庫小籠包 點餐結帳檯</h1>
            </div>
            <a href="dashboard.html" class="bg-orange-700 hover:bg-orange-800 text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm transition-all">
                📊 管理後台
            </a>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 space-y-4">
        
        <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
            <span class="text-sm font-bold text-slate-600">📅 結帳營業日期：</span>
            <input type="date" id="sale-date" class="bg-slate-50 border border-slate-300 rounded-lg px-3 py-1 text-sm font-bold text-slate-700 focus:outline-none focus:border-orange-500">
        </div>

        <div class="sticky top-[68px] z-40 bg-slate-100 py-2 -mx-4 px-4 overflow-x-auto flex gap-2 no-scrollbar">
            <button onclick="scrollToCategory('cat-main')" class="bg-white hover:bg-orange-50 text-slate-700 border border-slate-200 text-xs font-black px-4 py-2 rounded-full shadow-sm whitespace-nowrap cursor-pointer active:scale-95 transition-all">🍛 主食小吃</button>
            <button onclick="scrollToCategory('cat-dimsum')" class="bg-white hover:bg-orange-50 text-slate-700 border border-slate-200 text-xs font-black px-4 py-2 rounded-full shadow-sm whitespace-nowrap cursor-pointer active:scale-95 transition-all">🥟 點心包子</button>
            <button onclick="scrollToCategory('cat-drink')" class="bg-white hover:bg-orange-50 text-slate-700 border border-slate-200 text-xs font-black px-4 py-2 rounded-full shadow-sm whitespace-nowrap cursor-pointer active:scale-95 transition-all">🥤 養生飲品</button>
            <button onclick="scrollToCategory('cat-soup')" class="bg-white hover:bg-orange-50 text-slate-700 border border-slate-200 text-xs font-black px-4 py-2 rounded-full shadow-sm whitespace-nowrap cursor-pointer active:scale-95 transition-all">🥣 傳統湯品</button>
        </div>

        <div class="space-y-6">
            
            <div id="cat-main" class="space-y-2 scroll-mt-32">
                <h2 class="text-sm font-black text-slate-500 flex items-center gap-1.5 px-1">── 🍛 主食小吃 ──</h2>
                <div id="container-main" class="space-y-3"></div>
            </div>

            <div id="cat-dimsum" class="space-y-2 scroll-mt-32">
                <h2 class="text-sm font-black text-slate-500 flex items-center gap-1.5 px-1">── 🥟 點心包子 ──</h2>
                <div id="container-dimsum" class="space-y-3"></div>
            </div>

            <div id="cat-drink" class="space-y-2 scroll-mt-32">
                <h2 class="text-sm font-black text-slate-500 flex items-center gap-1.5 px-1">── 🥤 養生飲品 ──</h2>
                <div id="container-drink" class="space-y-3"></div>
            </div>

            <div id="cat-soup" class="space-y-2 scroll-mt-32">
                <h2 class="text-sm font-black text-slate-500 flex items-center gap-1.5 px-1">── 🥣 傳統湯品 ──</h2>
                <div id="container-soup" class="space-y-3"></div>
            </div>

        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-lg z-50">
            <div class="max-w-md mx-auto">
                <button id="btn-close-shop" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-3.5 rounded-xl shadow-md transition-all tracking-widest cursor-pointer text-center">
                    🚀 閉店確認送出
                </button>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 預設日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('sale-date').value = today;

            loadMenuProductsWithClassification(); // 載入並自動分類菜單
            initCloseShopListener(); // 綁定結帳按鈕
        });

        // 快捷鍵錨點平滑滾動功能
        function scrollToCategory(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 1. 自動通靈分類載入演算法
        function loadMenuProductsWithClassification() {
            // 修正點：將原先的 /api/products 改為對應後端的 /api/ingredients
            fetch('/api/ingredients')
                .then(res => res.json())
                .then(products => {
                    const cMain = document.getElementById('container-main');
                    const cDimsum = document.getElementById('container-dimsum');
                    const cDrink = document.getElementById('container-drink');
                    const cSoup = document.getElementById('container-soup');

                    // 清空原本的預設字
                    cMain.innerHTML = cDimsum.innerHTML = cDrink.innerHTML = cSoup.innerHTML = '';

                    if (!products || products.length === 0) {
                        return;
                    }

                    products.forEach(p => {
                        let cat = p.category || '';
                        let targetContainer = null;

                        // 萬能欄位字眼相容攔截
                        if (p.name.includes('湯') || p.name.includes('汤') || cat.includes('湯') || cat.includes('汤')) {
                            targetContainer = cSoup;
                        } else if (cat === '主食' || cat === '主食/小吃' || cat === '小吃') {
                            targetContainer = cMain;
                        } else if (cat === '中式點心/包子' || cat === '點心包子' || cat === '點心' || cat === '包子') {
                            targetContainer = cDimsum;
                        } else if (cat === '養生飲品' || cat === '養生饮品') {
                            targetContainer = cDrink;
                        }

                        // 如果沒配對成功，預設丟進主食小吃防呆
                        if (!targetContainer) {
                            targetContainer = cMain;
                        }

                        // 長出實體精緻小卡片
                        const div = document.createElement('div');
                        div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center";
                        div.innerHTML = `
                            <div>
                                <h3 class="font-black text-slate-800 text-base tracking-wide">${p.name}</h3>
                                <p class="text-xs text-orange-500 font-bold mt-0.5">$${p.price} / ${p.unit || '份'}</p>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <button type="button" onclick="changeQty(${p.id}, -1)" class="w-9 h-9 bg-slate-100 hover:bg-slate-200 text-slate-700 font-black rounded-lg transition-all text-lg cursor-pointer">-</button>
                                <input type="number" id="input-p-${p.id}" 
                                       class="product-input w-14 h-9 bg-white border border-slate-300 rounded-lg text-center font-extrabold text-slate-800 focus:outline-none focus:border-orange-500 shadow-inner text-sm"
                                       data-id="${p.id}" data-price="${p.price}" data-name="${p.name}"
                                       value="0" min="0" onblur="validateInput(this)">
                                <button type="button" onclick="changeQty(${p.id}, 1)" class="w-9 h-9 bg-slate-100 hover:bg-slate-200 text-slate-700 font-black rounded-lg transition-all text-lg cursor-pointer">+</button>
                            </div>
                        `;
                        targetContainer.appendChild(div);
                    });

                    // 分類防呆空值處理
                    if(cMain.innerHTML === '') cMain.innerHTML = '<p class="text-xs text-slate-400 py-2 px-1">今日暫無此分類品項</p>';
                    if(cDimsum.innerHTML === '') cDimsum.innerHTML = '<p class="text-xs text-slate-400 py-2 px-1">今日暫無此分類品項</p>';
                    if(cDrink.innerHTML === '') cDrink.innerHTML = '<p class="text-xs text-slate-400 py-2 px-1">今日暫無此分類品項</p>';
                    if(cSoup.innerHTML === '') cSoup.innerHTML = '<p class="text-xs text-slate-400 py-2 px-1">今日暫無此分類品項</p>';
                });
        }

        function changeQty(id, delta) {
            const input = document.getElementById(`input-p-${id}`);
            if (!input) return;
            let current = parseInt(input.value) || 0;
            current += delta;
            if (current < 0) current = 0;
            input.value = current;
        }

        function validateInput(input) {
            let val = parseInt(input.value);
            if (isNaN(val) || val < 0) input.value = 0;
        }

        function initCloseShopListener() {
            document.getElementById('btn-close-shop').addEventListener('click', function() {
                let orderItems = [];
                const selectedDate = document.getElementById('sale-date').value;
                const allInputs = document.querySelectorAll('.product-input');

                allInputs.forEach(input => {
                    const qty = parseInt(input.value) || 0;
                    if (qty > 0) {
                        const pId = input.getAttribute('data-id');
                        const pPrice = parseInt(input.getAttribute('data-price')) || 0;
                        const pName = input.getAttribute('data-name');

                        if (pId) {
                            orderItems.push({
                                product_id: parseInt(pId),
                                quantity_sold: qty,
                                total_revenue: qty * pPrice,
                                price: pPrice,
                                name: pName
                            });
                        }
                    }
                });

                if (orderItems.length === 0) {
                    alert('⚠️ 欄位全部都是 0！請先輸入今天賣出的數量再送出喔！');
                    return;
                }

                if (!confirm(`🚗 確定要送出收攤結帳嗎？\n品項共 ${orderItems.length} 種，即將同步進資料庫。`)) return;

                fetch('/api/sales', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sale_date: selectedDate, items: orderItems })
                })
                .then(res => {
                    if (!res.ok) return res.json().then(errData => { throw new Error(errData.error) });
                    return res.json();
                })
                .then(data => {
                    if (data.success) {
                        alert('🎉【正式成功】今日結帳資料已 100% 安全寫入資料庫！');
                        allInputs.forEach(input => input.value = 0);
                        window.location.href = 'dashboard.html';
                    }
                })
                .catch(err => {
                    alert('❌ 寫入失敗！原因：' + err.message);
                });
            });
        }
    </script>
</body>
</html>
