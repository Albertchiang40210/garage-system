<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車庫小籠包 - 原物料庫存智慧中控台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans antialiased pb-12">

    <header class="bg-emerald-900 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl animate-pulse">📦</span>
                <div>
                    <h1 class="text-xl font-black tracking-widest text-emerald-400">車庫小籠包 庫存後台</h1>
                    <p class="text-xs text-emerald-200 font-bold tracking-wide">實體物料進出貨與核心盤點大腦</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-black px-3 py-2 rounded-xl shadow-md transition-all">
                    📊 營運報表後台
                </a>
                <a href="index.html" class="bg-orange-600 hover:bg-orange-700 text-white text-xs font-black px-3 py-2 rounded-xl shadow-md transition-all">
                    🥟 前台點餐檯
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 space-y-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-100 pb-4 gap-4">
                <div class="space-y-1">
                    <h2 class="text-lg font-black text-slate-900 flex items-center gap-2">
                        <span>🏪 實體原物料與成品庫存大中控台</span>
                    </h2>
                    <p class="text-xs font-bold text-slate-400">💡 標記 <span class="text-amber-600 font-black">🖐️ 獨立手動盤點</span> 項目不與點餐連動，請店長定時盤點；標記 <span class="text-emerald-600 font-black">⚡ 結帳自動扣料</span> 項目會隨前台結帳自動扣除成品杯/顆數。</p>
                </div>
                
                <button onclick="loadIngredientStock()" class="w-full md:w-auto bg-gradient-to-r from-slate-800 to-slate-900 hover:from-emerald-800 hover:to-emerald-900 text-white font-black px-5 py-3 rounded-xl shadow-md flex items-center justify-center gap-2.5 cursor-pointer transition-all active:scale-95 text-xs whitespace-nowrap tracking-wider group border border-slate-700">
                    <span class="text-sm inline-block transition-transform duration-700 group-hover:rotate-360 group-active:rotate-360">🔄</span> 
                    <span>同步資料庫最新庫存</span>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2" id="ingredient-stock-list">
                </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadIngredientStock(); // 網頁開啟自動載入一次
        });

        // 庫存面板雙欄大字、大按鈕渲染演算法
        function loadIngredientStock() {
            fetch('/api/ingredients')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('ingredient-stock-list');
                    container.innerHTML = '';

                    if (!data || data.length === 0) {
                        container.innerHTML = '<p class="text-xs text-slate-400 text-center py-8 col-span-2">資料庫內無原物料資料</p>';
                        return;
                    }

                    data.forEach(ing => {
                        const isLow = Number(ing.stock_qty) <= Number(ing.min_stock);
                        
                        let typeBadge = '';
                        let textTheme = '';
                        
                        // 🎯 完美鎖定：豬肉絞肉(1)、小籠包皮(2)、以及豆漿原料(大袋)(20) 永遠固定為橘色手動盤點！
                        if (ing.id <= 2 || ing.id === 20) {
                            typeBadge = `<span class="text-[10px] bg-amber-100 text-amber-700 font-black px-1.5 py-0.5 rounded-md">🖐️ 獨立手動盤點</span>`;
                            textTheme = 'text-amber-800';
                        } else {
                            typeBadge = `<span class="text-[10px] bg-emerald-100 text-emerald-700 font-black px-1.5 py-0.5 rounded-md">⚡ 結帳自動扣料</span>`;
                            textTheme = 'text-slate-800';
                        }

                        // 低庫存告急時，卡片自動亮起亮紅燈與警報
                        const cardBg = isLow ? "bg-red-50 border-2 border-red-300 animate-pulse text-red-700" : "bg-slate-50 border border-slate-200";
                        const alertBadge = isLow ? `<span class="text-[10px] bg-red-600 text-white font-black px-1.5 py-0.5 rounded-md ml-1 animate-bounce">🚨 庫存告急</span>` : '';

                        const unitLabel = ing.unit;
                        // 加大加大再加大的快捷按鈕，手指絕對不誤觸
                        const btnPlus5 = `<button onclick="quickRefill(${ing.id}, 5)" class="flex-1 bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 font-black py-2.5 rounded-xl text-xs shadow-sm cursor-pointer transition-all active:scale-95">+5 ${unitLabel}</button>`;
                        const btnPlus10 = `<button onclick="quickRefill(${ing.id}, 10)" class="flex-1 bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 font-black py-2.5 rounded-xl text-xs shadow-sm cursor-pointer transition-all active:scale-95">+10 ${unitLabel}</button>`;

                        const div = document.createElement('div');
                        div.className = `${cardBg} p-4 rounded-2xl flex flex-col justify-between space-y-4 shadow-sm transition-all hover:shadow-md`;
                        div.innerHTML = `
                            <div class="flex justify-between items-start">
                                <div class="space-y-1">
                                    <h4 class="text-sm font-black ${isLow ? 'text-red-700': textTheme}">${ing.name}</h4>
                                    <div class="flex items-center gap-1">${typeBadge} ${alertBadge}</div>
                                </div>
                                <span class="text-2xl font-black ${isLow ? 'text-red-700':'text-slate-900'}">
                                    ${parseFloat(ing.stock_qty).toLocaleString()} <span class="text-xs font-bold text-slate-400">${unitLabel}</span>
                                </span>
                            </div>
                            <div class="flex gap-2 pt-1 border-t border-slate-200/50">
                                ${btnPlus5}
                                ${btnPlus10}
                                <button onclick="customRefill(${ing.id}, '${ing.name}')" class="flex-1 bg-emerald-800 hover:bg-emerald-900 text-white font-black py-2.5 rounded-xl text-xs shadow-md cursor-pointer transition-all active:scale-95">✏️ 自訂調整</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(err => console.error('庫存面板渲染失敗:', err));
        }

        function quickRefill(id, qty) {
            fetch(`/api/ingredients/${id}/stock`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adjust_qty: qty })
            }).then(() => loadIngredientStock());
        }

        function customRefill(id, name) {
            const val = prompt(`📦 [${name}] 進貨/手動盤點校正：\n\n請輸入要「追加或減少」的庫存數量：\n（進貨增加請直接輸入正數如：20，少貨盤點請輸入負數如：-5）`);
            if (val === null || isNaN(Number(val))) return;
            fetch(`/api/ingredients/${id}/stock`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adjust_qty: Number(val) })
            }).then(() => loadIngredientStock());
        }
    </script>
</body>
</html>
